[pytest]
# Custom markers. `--strict-markers` rejects any @pytest.mark that isn't
# registered here, so a typo in a marker fails the run rather than silently
# skipping nothing.
addopts = --strict-markers
markers =
    hmrc_sandbox: Tests that hit https://test-api.service.hmrc.gov.uk directly. Skipped unless HMRC_REAL_SANDBOX_E2E=1 + HMRC_CLIENT_ID + HMRC_CLIENT_SECRET are exported. Run with: pytest -m hmrc_sandbox
