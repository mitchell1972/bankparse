<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Choose a new password — BankScan AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1B4F72;
            --primary-light: #2E86C1;
            --accent: #27AE60;
            --danger: #E74C3C;
            --bg: #F8F9FA;
            --card: #FFFFFF;
            --text: #2C3E50;
            --muted: #7F8C8D;
            --border: #E5E7EB;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container { width: 100%; max-width: 420px; padding: 1.5rem; }
        .branding { text-align: center; margin-bottom: 2rem; }
        .branding h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            padding: 2rem;
        }
        h2 { color: var(--primary); margin-bottom: 0.5rem; }
        p { color: var(--muted); margin-bottom: 1.5rem; line-height: 1.5; }
        .field { margin-bottom: 1.25rem; }
        .field label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }
        .field input {
            width: 100%;
            padding: 0.7rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
        }
        .field input:focus { outline: none; border-color: var(--primary-light); }
        .password-hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.4rem; }
        .btn {
            width: 100%;
            padding: 0.85rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { background: var(--primary-light); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .msg {
            padding: 0.85rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
        .msg.success { background: #E8F8EF; color: #207844; border: 1px solid #B7E4C7; display: block; }
        .msg.error { background: #FDECEA; color: #A93226; border: 1px solid #F5B7B1; display: block; }
        .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
        .footer-link a { color: var(--primary-light); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="branding"><h1>BankScan AI</h1></div>
        <div class="card">
            <h2>Choose a new password</h2>
            <p>Enter a new password for your account. After you submit, sign in with the new password.</p>
            <div id="message" class="msg"></div>
            <form id="resetForm" onsubmit="handleSubmit(event)">
                <div class="field">
                    <label for="password">New password</label>
                    <input type="password" id="password" required autocomplete="new-password" placeholder="At least 8 characters">
                    <div class="password-hint">Minimum 8 characters</div>
                </div>
                <div class="field">
                    <label for="confirm">Confirm new password</label>
                    <input type="password" id="confirm" required autocomplete="new-password" placeholder="Re-enter the same password">
                </div>
                <button type="submit" class="btn" id="submitBtn">Update password</button>
            </form>
            <div class="footer-link">
                <a href="/login">Back to sign in</a>
            </div>
        </div>
    </div>
    <script>
        function getCsrfToken() {
            const m = document.cookie.match(/(^|;\s*)bp_csrf=([^;]+)/);
            return m ? m[2] : '';
        }
        function getQueryToken() {
            const p = new URLSearchParams(window.location.search);
            return p.get('token') || '';
        }
        async function handleSubmit(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const token = getQueryToken();
            msg.className = 'msg'; msg.textContent = '';
            if (!token) {
                msg.className = 'msg error';
                msg.textContent = 'Missing reset token. Use the link from your email.';
                return;
            }
            if (password.length < 8) {
                msg.className = 'msg error';
                msg.textContent = 'Password must be at least 8 characters.';
                return;
            }
            if (password !== confirm) {
                msg.className = 'msg error';
                msg.textContent = "Passwords don't match.";
                return;
            }
            btn.disabled = true; btn.textContent = 'Updating…';
            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken() },
                    body: JSON.stringify({ token, password }),
                });
                const data = await res.json();
                if (res.ok) {
                    msg.className = 'msg success';
                    msg.textContent = 'Password updated. Redirecting to sign in…';
                    setTimeout(() => { window.location.href = '/login'; }, 1500);
                } else {
                    msg.className = 'msg error';
                    msg.textContent = data.detail || 'Reset failed. The link may have expired.';
                }
            } catch (err) {
                msg.className = 'msg error';
                msg.textContent = 'Network error. Please try again.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update password';
            }
        }
        if (!getCsrfToken()) { fetch('/api/csrf', { method: 'GET', credentials: 'same-origin' }); }
    </script>
</body>
</html>
