<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Verify your email — BankScan AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #1B4F72;
            --primary-light: #2E86C1;
            --accent: #27AE60;
            --danger: #E74C3C;
            --bg: #F8F9FA;
            --card: #FFFFFF;
            --text: #2C3E50;
            --muted: #7F8C8D;
            --border: #E5E7EB;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .branding {
            text-align: center;
            margin-bottom: 2rem;
        }

        .branding h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .branding p {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 1.75rem;
        }

        .intro {
            font-size: 0.95rem;
            color: var(--text);
            margin-bottom: 1.25rem;
            line-height: 1.5;
        }

        .intro strong {
            color: var(--primary);
        }

        .field {
            margin-bottom: 1.25rem;
        }

        .field label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.4rem;
        }

        .field input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 1.4rem;
            letter-spacing: 0.3em;
            text-align: center;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(46,134,193,0.12);
        }

        .submit-btn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .submit-btn:hover { opacity: 0.92; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .resend-btn {
            width: 100%;
            margin-top: 0.75rem;
            padding: 0.75rem;
            background: transparent;
            color: var(--muted);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }

        .resend-btn:hover:not(:disabled) {
            color: var(--primary);
            border-color: var(--primary-light);
        }

        .resend-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .msg {
            padding: 0.7rem 0.9rem;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-bottom: 1rem;
            display: none;
        }

        .msg.visible { display: block; }
        .msg.error { background: #FDF2F2; color: var(--danger); border: 1px solid #FECACA; }
        .msg.success { background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--muted);
            font-size: 0.85rem;
        }

        .footer-text a { color: var(--primary-light); text-decoration: none; }
        .footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="branding">
            <h1>Verify your email</h1>
            <p>One last step before you can start parsing.</p>
        </div>

        <div class="card">
            <p class="intro">
                We've sent a 6-digit code to <strong>{{ email }}</strong>. Enter it below to activate your account.
            </p>

            <div id="msg" class="msg"></div>

            <form id="verify-form">
                <div class="field">
                    <label for="code">Verification code</label>
                    <input type="text" id="code" name="code" inputmode="numeric" maxlength="6" autocomplete="one-time-code" required>
                </div>
                <button type="submit" class="submit-btn" id="verify-btn">Verify email</button>
            </form>

            <button type="button" class="resend-btn" id="resend-btn">Resend code</button>
        </div>

        <p class="footer-text">
            Wrong address? <a href="/api/logout" onclick="event.preventDefault(); fetch('/api/logout',{method:'POST'}).then(()=>location.href='/login');">Sign out</a>
        </p>
    </div>

    <script>
        const form = document.getElementById('verify-form');
        const msgEl = document.getElementById('msg');
        const verifyBtn = document.getElementById('verify-btn');
        const resendBtn = document.getElementById('resend-btn');
        const codeInput = document.getElementById('code');

        function showMsg(text, type) {
            msgEl.textContent = text;
            msgEl.className = 'msg ' + type + ' visible';
        }

        function clearMsg() {
            msgEl.className = 'msg';
            msgEl.textContent = '';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMsg();
            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Verifying...';
            try {
                const res = await fetch('/api/verify-email-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: codeInput.value.trim() }),
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.detail || 'Verification failed.');
                showMsg('Email verified — redirecting to dashboard...', 'success');
                setTimeout(() => { window.location.href = '/'; }, 800);
            } catch (err) {
                showMsg(err.message || 'Verification failed.', 'error');
                verifyBtn.disabled = false;
                verifyBtn.textContent = 'Verify email';
            }
        });

        resendBtn.addEventListener('click', async () => {
            clearMsg();
            resendBtn.disabled = true;
            resendBtn.textContent = 'Sending...';
            try {
                const res = await fetch('/api/verify-email/resend', { method: 'POST' });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.detail || 'Failed to resend code.');
                showMsg('A new code has been sent. Check your inbox.', 'success');
            } catch (err) {
                showMsg(err.message || 'Failed to resend code.', 'error');
            } finally {
                setTimeout(() => {
                    resendBtn.disabled = false;
                    resendBtn.textContent = 'Resend code';
                }, 2000);
            }
        });
    </script>
</body>
</html>
