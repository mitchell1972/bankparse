<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Forgot password — BankScan AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1B4F72;
            --primary-light: #2E86C1;
            --accent: #27AE60;
            --danger: #E74C3C;
            --bg: #F8F9FA;
            --card: #FFFFFF;
            --text: #2C3E50;
            --muted: #7F8C8D;
            --border: #E5E7EB;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container { width: 100%; max-width: 420px; padding: 1.5rem; }
        .branding { text-align: center; margin-bottom: 2rem; }
        .branding h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            padding: 2rem;
        }
        h2 { color: var(--primary); margin-bottom: 0.5rem; }
        p { color: var(--muted); margin-bottom: 1.5rem; line-height: 1.5; }
        .field { margin-bottom: 1.25rem; }
        .field label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text);
        }
        .field input {
            width: 100%;
            padding: 0.7rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
        }
        .field input:focus { outline: none; border-color: var(--primary-light); }
        .btn {
            width: 100%;
            padding: 0.85rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { background: var(--primary-light); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .msg {
            padding: 0.85rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
        .msg.success { background: #E8F8EF; color: #207844; border: 1px solid #B7E4C7; display: block; }
        .msg.error { background: #FDECEA; color: #A93226; border: 1px solid #F5B7B1; display: block; }
        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .footer-link a { color: var(--primary-light); text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="branding">
            <h1>BankScan AI</h1>
        </div>
        <div class="card">
            <h2>Forgot your password?</h2>
            <p>Enter your email and we'll send you a link to choose a new one. The link expires in 30 minutes.</p>
            <div id="message" class="msg"></div>
            <form id="forgotForm" onsubmit="handleSubmit(event)">
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
                </div>
                <button type="submit" class="btn" id="submitBtn">Send reset link</button>
            </form>
            <div class="footer-link">
                <a href="/login">Back to sign in</a>
            </div>
        </div>
    </div>
    <script>
        function getCsrfToken() {
            const match = document.cookie.match(/(^|;\s*)bp_csrf=([^;]+)/);
            return match ? match[2] : '';
        }
        async function handleSubmit(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');
            const email = document.getElementById('email').value.trim();
            msg.className = 'msg'; msg.textContent = '';
            btn.disabled = true; btn.textContent = 'Sending…';
            try {
                const res = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken() },
                    body: JSON.stringify({ email }),
                });
                const data = await res.json();
                if (res.ok) {
                    msg.className = 'msg success';
                    msg.textContent = data.message || 'If an account exists for that email, a reset link is on its way.';
                } else {
                    msg.className = 'msg error';
                    msg.textContent = data.detail || 'Something went wrong. Try again in a moment.';
                }
            } catch (err) {
                msg.className = 'msg error';
                msg.textContent = 'Network error. Please try again.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send reset link';
            }
        }
        // Make sure we have a CSRF cookie before submitting
        if (!getCsrfToken()) { fetch('/api/csrf', { method: 'GET', credentials: 'same-origin' }); }
    </script>
</body>
</html>
