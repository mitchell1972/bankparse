name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install runtime deps
        run: pip install -r requirements.txt

      - name: Install test deps
        run: pip install pytest pytest-asyncio

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/e2e -q
        env:
          SECRET_KEY: test-secret-key
          STRIPE_SECRET_KEY: ''
          ANTHROPIC_API_KEY: ''

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Start server for trial E2E
        run: |
          python -c "
          import subprocess, time, os
          os.environ['SECRET_KEY'] = 'test-secret-key'
          os.environ['TEST_MODE_ENABLED'] = '1'
          os.environ['ANTHROPIC_API_KEY'] = ''
          os.environ['STRIPE_SECRET_KEY'] = ''
          p = subprocess.Popen(['python', '-m', 'uvicorn', 'app:app', '--host', '0.0.0.0', '--port', '8000'])
          time.sleep(5)
          print('Server started')
          "

      - name: Run trial cumulative E2E test
        run: BASE_URL=http://localhost:8000 python tests/e2e_trial_cumulative.py

      - name: Run Playwright E2E tests
        run: pytest tests/e2e/ -q --browser chromium
        env:
          SECRET_KEY: test-secret-key
          STRIPE_SECRET_KEY: ''
          ANTHROPIC_API_KEY: ''
          RESEND_API_KEY: ''
          TEST_MODE_ENABLED: '1'

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          if-no-files-found: ignore
